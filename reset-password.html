<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Luxury Real Estate</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #4c1d95;
            --gold: #d4af37;
            --gold-hover: #b8860b;
            --bg: #0f172a;
            --error: #f87171;
            --success: #4ade80;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at center, #2e1065, #0f172a);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .logo-icon {
            background: var(--gold);
            color: var(--primary);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
        }

        h2 { color: var(--gold); margin: 0 0 10px 0; }
        p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 25px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-size: 0.8rem; color: #cbd5e1; }
        
        input {
            width: 100%; padding: 12px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: white; box-sizing: border-box;
            outline: none; font-size: 0.9rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gold), var(--gold-hover));
            color: #1e293b; width: 100%; padding: 14px; border: none;
            border-radius: 10px; font-weight: 700; cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }

        .message {
            padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.85rem; display: none;
        }
        .error { background: rgba(248, 113, 113, 0.1); border: 1px solid var(--error); color: var(--error); }
        .success { background: rgba(74, 222, 128, 0.1); border: 1px solid var(--success); color: var(--success); }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-icon"><i data-lucide="key-round"></i></div>
    <h2>New Password</h2>
    <p>Set a new secure password for your account.</p>

    <div id="statusMsg" class="message"></div>

    <form id="resetForm" onsubmit="handleReset(event)">
        <div class="input-group">
            <label>New Password</label>
            <input type="password" id="newPass" placeholder="Min 6 characters" required>
        </div>
        <div class="input-group">
            <label>Confirm Password</label>
            <input type="password" id="confirmPass" placeholder="Repeat password" required>
        </div>
        <button type="submit" class="btn-primary" id="resetBtn">Update Password</button>
    </form>
</div>

<script>
    lucide.createIcons();
    
    // Use the same credentials as your main page
    const supabaseUrl = "https://xeesusgbdyrgxvzevjha.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhlZXN1c2diZHlyZ3h2emV2amhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzI1MzksImV4cCI6MjA4ODQ0ODUzOX0.8TjnH50MO4YBu8liCJwnUu36hiX6zAwRpGOCPFVW7sI";
    const client = supabase.createClient(supabaseUrl, supabaseKey);

    async function handleReset(e) {
        e.preventDefault();
        const newPass = document.getElementById('newPass').value;
        const confirmPass = document.getElementById('confirmPass').value;
        const msgDiv = document.getElementById('statusMsg');
        const btn = document.getElementById('resetBtn');

        if (newPass !== confirmPass) {
            showMessage("Passwords do not match", "error");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Updating...";

        const { error } = await client.auth.updateUser({ password: newPass });

        if (error) {
            showMessage(error.message, "error");
            btn.disabled = false;
            btn.innerText = "Update Password";
        } else {
            showMessage("Password updated! Redirecting to login...", "success");
            setTimeout(() => {
                window.location.href = "index.html"; // Replace with your login filename
            }, 3000);
        }
    }

    function showMessage(text, type) {
        const msgDiv = document.getElementById('statusMsg');
        msgDiv.innerText = text;
        msgDiv.className = `message ${type}`;
        msgDiv.style.display = 'block';
    }
</script>
</body>
</html>
